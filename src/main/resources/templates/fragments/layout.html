<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ══ Shared CSS ══════════════════════════════════════════════════════════ -->
<style th:fragment="styles">
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; }

  header {
    background: #6b0f1a; color: #fff;
    padding: 14px 32px; display: flex; align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header span { font-size: .78rem; opacity: .7; margin-left: 12px; }

  nav {
    background: #fff; border-bottom: 2px solid #e0e0e0;
    padding: 0 32px; display: flex; flex-wrap: wrap; gap: 2px;
  }
  nav a {
    display: inline-block; padding: 10px 16px;
    text-decoration: none; color: #555; font-size: .88rem;
    border-bottom: 3px solid transparent; transition: color .2s, border-color .2s;
  }
  nav a:hover, nav a.active { color: #6b0f1a; border-bottom-color: #6b0f1a; font-weight: 600; }
  nav .nav-sep { padding: 10px 4px; color: #ccc; }

  main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

  .page-title { font-size: 1.3rem; font-weight: 700; color: #6b0f1a; margin-bottom: 4px; }
  .page-sub   { font-size: .84rem; color: #777; margin-bottom: 20px; }

  .card {
    background: #fff; border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.11); padding: 22px; margin-bottom: 20px;
  }
  .card h2 { font-size: .88rem; color: #555; margin-bottom: 14px; text-transform: uppercase; letter-spacing:.06em; }

  /* alerts */
  .alert {
    padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: .88rem;
  }
  .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  .alert-error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

  /* table */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th { background: #6b0f1a; color: #fff; padding: 9px 13px; text-align: left; white-space: nowrap; }
  td { padding: 8px 13px; border-bottom: 1px solid #ececec; vertical-align: top; }
  tr:hover td { background: #fdf5f5; }
  .row-count { margin-top: 8px; font-size: .78rem; color: #aaa; }

  /* badges */
  .badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:.76rem; font-weight:600; }
  .badge-green  { background:#d4edda; color:#155724; }
  .badge-blue   { background:#d1ecf1; color:#0c5460; }
  .badge-yellow { background:#fff3cd; color:#856404; }
  .badge-red    { background:#f8d7da; color:#721c24; }
  .badge-gray   { background:#e2e3e5; color:#383d41; }

  /* form */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: .88rem; font-weight: 600; margin-bottom: 5px; color: #444; }
  input[type=text], input[type=date], input[type=email],
  select, textarea {
    width: 100%; padding: 9px 11px; border: 1px solid #ccc;
    border-radius: 5px; font-size: .88rem; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #6b0f1a; box-shadow: 0 0 0 2px rgba(107,15,26,.12);
  }
  .field-error { color: #c0392b; font-size: .8rem; margin-top: 3px; }
  textarea { resize: vertical; min-height: 80px; }

  /* buttons */
  .btn { display:inline-block; padding:9px 20px; border-radius:5px; font-size:.88rem;
         cursor:pointer; font-family:inherit; font-weight:600; text-decoration:none; border:none; }
  .btn-primary  { background:#6b0f1a; color:#fff; }
  .btn-primary:hover { background:#5a0d16; }
  .btn-danger   { background:#c0392b; color:#fff; }
  .btn-danger:hover { background:#a93226; }
  .btn-secondary { background:#fff; color:#555; border:1px solid #ccc; }
  .btn-secondary:hover { background:#f5f5f5; }

  /* report dashboard */
  .report-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:16px;
  }
  .report-card {
    background:#fff; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.11);
    padding:20px; text-decoration:none; color:inherit; border-left:5px solid #6b0f1a;
    transition:transform .15s, box-shadow .15s;
  }
  .report-card:hover { transform:translateY(-3px); box-shadow:0 4px 12px rgba(0,0,0,.17); }
  .report-card .rc-num   { font-size:1.8rem; color:#6b0f1a; font-weight:700; }
  .report-card .rc-title { font-size:.95rem; font-weight:600; margin:5px 0 3px; }
  .report-card .rc-desc  { font-size:.8rem; color:#777; }
</style>

<!-- ══ Header + Nav fragment ═══════════════════════════════════════════════ -->
<div th:fragment="header-nav">
  <header>
    <h1>Office of a President — Database System</h1>
    <span>Nychyporuk Daryna</span>
  </header>
  <nav>
    <a th:href="@{/incoming-request}"
       th:classappend="${#httpServletRequest.requestURI.startsWith('/incoming-request')} ? ' active'">
      📋 Incoming Requests
    </a>
    <a th:href="@{/task}"
       th:classappend="${#httpServletRequest.requestURI.startsWith('/task')} ? ' active'">
      ✅ Tasks
    </a>
    <span class="nav-sep">|</span>
    <a th:href="@{/report}"
       th:classappend="${#httpServletRequest.requestURI.startsWith('/report')} ? ' active'">
      📊 Reports
    </a>
    <a th:href="@{/report/request-status}"
       th:classappend="${#httpServletRequest.requestURI == '/report/request-status'} ? ' active'">
      Status
    </a>
    <a th:href="@{/report/overdue-tasks}"
       th:classappend="${#httpServletRequest.requestURI == '/report/overdue-tasks'} ? ' active'">
      Overdue
    </a>
    <a th:href="@{/report/department-workload}"
       th:classappend="${#httpServletRequest.requestURI == '/report/department-workload'} ? ' active'">
      Workload
    </a>
    <a th:href="@{/report/document-processing}"
       th:classappend="${#httpServletRequest.requestURI == '/report/document-processing'} ? ' active'">
      Documents
    </a>
  </nav>
</div>

</html>
